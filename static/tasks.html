<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tasks — NexTask</title>
  <meta name="description" content="View and manage all your tasks in NexTask. Filter by status, create new tasks, and track progress."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css?v=4"/>
</head>
<body class="dashboard-layout" id="tasksPage">
  <canvas id="particleCanvas"></canvas>

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="10" height="10" rx="2" fill="url(#tg1)"/>
        <rect x="16" y="2" width="10" height="10" rx="2" fill="url(#tg2)" opacity="0.7"/>
        <rect x="2" y="16" width="10" height="10" rx="2" fill="url(#tg3)" opacity="0.7"/>
        <rect x="16" y="16" width="10" height="10" rx="2" fill="url(#tg1)"/>
        <defs>
          <linearGradient id="tg1" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
          <linearGradient id="tg2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
          <linearGradient id="tg3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#c084fc"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
        </defs>
      </svg>
      NexTask
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Menu</div>
      <a href="/dashboard" class="sidebar-link" id="nav-dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/tasks-ui" class="sidebar-link active" id="nav-tasks">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        My Tasks
        <span class="link-badge" id="taskCountBadge">0</span>
      </a>

      <div class="sidebar-section-label manager-only" style="display:none;">Manager</div>
      <a href="/dashboard" class="sidebar-link manager-only" id="nav-users" style="display:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Team Members
      </a>

    </nav>

    <div class="sidebar-user">
      <div class="user-avatar-lg" id="sidebarAvatar">?</div>
      <div class="user-info">
        <div class="user-email" id="sidebarEmail">Loading...</div>
        <div class="user-role-badge" id="sidebarRole">—</div>
      </div>
      <button class="sidebar-logout" id="logoutBtn" title="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- ─── Main Content ─── -->
  <main class="main-content">

    <!-- Sticky Top Bar -->
    <div class="top-bar">
      <div class="top-bar-title">
        <h1>My Tasks</h1>
        <p id="welcomeMsg">All your tasks in one place.</p>
      </div>
      <div class="top-bar-actions">
        <button class="btn-primary" id="openCreateTaskBtn" onclick="openCreateModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Task
        </button>
      </div>
    </div>

    <!-- Page Body -->
    <div class="page-body">

      <!-- Status Summary Chips -->
      <div class="status-chips-row" id="statusChips">
        <div class="status-chip">
          <span class="chip-dot" style="background:var(--indigo-400);box-shadow:0 0 8px var(--indigo-400);"></span>
          <span class="chip-label">To Do</span>
          <strong class="chip-count chip-count-indigo" id="chipTodo">0</strong>
        </div>
        <div class="status-chip">
          <span class="chip-dot" style="background:#facc15;box-shadow:0 0 8px #facc15;"></span>
          <span class="chip-label">In Progress</span>
          <strong class="chip-count chip-count-yellow" id="chipProgress">0</strong>
        </div>
        <div class="status-chip">
          <span class="chip-dot" style="background:var(--green-400);box-shadow:0 0 8px var(--green-400);"></span>
          <span class="chip-label">Done</span>
          <strong class="chip-count chip-count-green" id="chipDone">0</strong>
        </div>
      </div>

      <!-- Tasks Table Card -->
      <div class="section-card">

        <!-- Header: title left, filters + search right -->
        <div class="section-card-header tasks-card-header">
          <div class="section-card-title">
            <div class="section-card-title-dot"></div>
            All Tasks
            <span class="tasks-total-badge" id="tasksTotalBadge">0</span>
          </div>
          <div class="tasks-controls">
            <div class="board-filters">
              <button class="filter-btn active" data-filter="all" onclick="applyFilter('all',this)">All</button>
              <button class="filter-btn" data-filter="todo" onclick="applyFilter('todo',this)">To Do</button>
              <button class="filter-btn" data-filter="in_progress" onclick="applyFilter('in_progress',this)">In Progress</button>
              <button class="filter-btn" data-filter="done" onclick="applyFilter('done',this)">Done</button>
            </div>
            <div class="search-input-wrap">
              <span class="search-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </span>
              <input type="text" class="search-input" id="taskSearchInput" placeholder="Search tasks…" oninput="searchTasks(this.value)"/>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="tasks-table-wrap" id="allTasksTable" style="border:none;border-radius:0;background:transparent;">
          <table class="tasks-table">
            <thead>
              <tr>
                <th style="width:52px;">#</th>
                <th>Title</th>
                <th>Description</th>
                <th style="width:130px;">Status</th>
                <th id="ownerColH" style="display:none;width:140px;">Owner</th>
                <th style="width:110px;">Actions</th>
              </tr>
            </thead>
            <tbody id="allTasksBody">
              <tr><td colspan="6" style="text-align:center;padding:60px;color:var(--text-muted);">Loading tasks…</td></tr>
            </tbody>
          </table>
        </div>

      </div><!-- /section-card -->

    </div><!-- /page-body -->
  </main>

  <!-- ─── Create/Edit Task Modal ─── -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">New Task</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="editTaskId"/>
        <div class="form-group">
          <label class="form-label" for="taskTitle">Task Title *</label>
          <input type="text" id="taskTitle" class="form-input" placeholder="e.g. Implement JWT middleware" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="taskDesc">Description</label>
          <textarea id="taskDesc" class="form-input" placeholder="Optional details…" rows="3" style="resize:vertical;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="taskStatus">Status</label>
          <div style="position:relative;">
            <select id="taskStatus" class="form-select">
              <option value="todo">◻ To Do</option>
              <option value="in_progress">● In Progress</option>
              <option value="done">✓ Done</option>
            </select>
            <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;">▾</span>
          </div>
        </div>
        <div class="form-group manager-field" id="ownerIdField" style="display:none;">
          <label class="form-label" for="taskOwnerId">Assign to User ID <span style="color:var(--text-muted);font-weight:400;">(Manager only)</span></label>
          <input type="number" id="taskOwnerId" class="form-input" placeholder="Leave blank for yourself"/>
        </div>
        <div style="display:flex;gap:12px;margin-top:24px;">
          <button type="submit" class="form-submit" style="flex:1;padding:13px;">
            <span id="taskSubmitLabel">Create Task</span>
          </button>
          <button type="button" class="btn-outline" onclick="closeModal()" style="padding:13px 20px;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/main.js?v=4"></script>
  <script src="js/dashboard.js?v=4"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window._tasksPageMode = true;
    });
  </script>
</body>
</html>
